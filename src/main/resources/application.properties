
# JWT signing secret - override with JWT_SECRET env var in any non-local environment
secret.key=${JWT_SECRET:o3Zii2j1UOzPLfE6vVe9i+mOTwfAAcg5+buYn37gQUZ6WS7Kp36cT/grN/Qw5x10}

# Database connection - override with DB_URL / DB_USERNAME / DB_PASSWORD env vars
# Defaults match local MAMP MySQL (port 8889, root/root)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:8889/HelpingHands}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Directory for uploaded media - relative to where the app is run, auto-created on startup
upload.directory=${UPLOAD_DIR:./uploads}

# Allowed CORS origins (comma-separated) for the frontend
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Stripe (test mode keys by default - get real ones from https://dashboard.stripe.com/test/apikeys)
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:pk_test_placeholder}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
